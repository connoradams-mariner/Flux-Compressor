# release-please: automated semantic versioning + release cuts.
#
# ## Why `release-type` is `simple` (not `rust`)
#
# Both the `rust` release-type and the `cargo-workspace` plugin walk
# workspace member crates and try to read `[package].version` as a
# literal string.  They fail on `version.workspace = true`
# (Cargo workspace inheritance) with one of:
#
#   * "package manifest at crates/X/Cargo.toml has an invalid
#     [package.version]"  (cargo-workspace plugin)
#   * "value at path package.version is not tagged"  (rust strategy)
#
# Tracking issues: googleapis/release-please#2111, #2478.
#
# Workaround used by other Rust workspace projects: switch to
# `release-type: simple`, which is a pure version-bumper that doesn't
# introspect Cargo.toml at all.  We then use the `extra-files` jsonpath
# updaters in `release-please-config.json` to bump
# `[workspace.package].version` in the root Cargo.toml, and every
# member crate inherits via `version.workspace = true` at `cargo build`
# time.  Re-evaluate if release-please ships a fix.
#
# ## How it works
#
# 1.  You push / merge a PR into `main` with a Conventional Commit
#     title. Examples:
#       * `feat: add null-aware compression wrapper`      -> minor bump
#       * `fix: Spark 3.5.1 ArrowUtils signature`         -> patch bump
#       * `feat!: remove legacy `compress_u64` API`       -> major bump
#       * `chore: bump deps`                              -> no bump
#       * `docs: clarify serverless limits`               -> no bump (but
#                                                           still shows up
#                                                           in CHANGELOG).
# 2.  This workflow runs, parses the commit history since the last
#     release tag, and opens (or updates) a long-lived PR titled
#     `chore(main): release X.Y.Z` that:
#       * Bumps the version in every file declared as `extra-files`
#         in `release-please-config.json`.
#       * Updates `CHANGELOG.md` with generated release notes.
# 3.  When you merge that Release PR, this workflow fires again and
#     creates a GitHub Release + a `vX.Y.Z` git tag.
# 4.  The `vX.Y.Z` tag triggers the three existing release workflows
#     (`release-crates.yml`, `release-pypi.yml`, `release-maven.yml`)
#     exactly as before - nothing downstream changes.
#
# ## Branch protection notes
#
# * `main` is protected; normal work goes through `staging -> PR -> main`.
# * release-please creates its own branch (`release-please--branches--main`)
#   and opens a PR into main. Branch-protection rules that require
#   status checks to pass will still apply to that PR.
# * We use a fine-grained PAT (`RELEASE_PLEASE_TOKEN`) instead of the
#   default `GITHUB_TOKEN`.  Reason: GitHub Actions explicitly
#   blocks workflow runs triggered by events from the default
#   `GITHUB_TOKEN` to prevent recursive workflow invocation.  Without
#   the PAT, every `vX.Y.Z` tag release-please pushes is silently
#   ignored by `release-crates.yml`, `release-pypi.yml`,
#   `release-maven.yml`, and `release-binaries.yml` â€” they only fire
#   if a human pushes the tag.  Using a PAT makes the tag look like a
#   user push and the downstream pipelines run automatically.
#
#   The PAT is fine-grained, scoped to this repo only, with
#   `Contents: write` and `Pull requests: write`.  Rotate per the
#   token's expiration (default 90 days).  See `docs/homebrew.md` for
#   the equivalent walkthrough of `HOMEBREW_TAP_TOKEN`.

name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write        # needed to push commits + tags
  pull-requests: write   # needed to open / update the release PR

concurrency:
  # Never have two release-please runs racing on `main`.
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open / update release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Fine-grained PAT scoped to this repo (Contents: write,
          # Pull requests: write).  Required so the `vX.Y.Z` tags this
          # action pushes actually trigger the four downstream
          # `release-*.yml` workflows; the default `GITHUB_TOKEN` is
          # blocked from causing workflow re-entry.  See the header
          # comment for full context.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Monorepo-manifest mode - see `release-please-config.json`
          # and `.release-please-manifest.json` in the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Optional visibility step: expose whether this run cut a new
      # release so downstream jobs in other workflows can hook in.
      - name: Show outputs
        if: always()
        run: |
          echo "Release created: ${{ steps.release.outputs.release_created }}"
          echo "Tag:             ${{ steps.release.outputs.tag_name }}"
          echo "Version:         ${{ steps.release.outputs.version }}"
